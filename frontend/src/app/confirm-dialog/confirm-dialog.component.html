<div style="padding: 24px; min-width: 320px;">
  <h2 style="margin: 0 0 12px; color: #111827;">Confirmation</h2>
  <p style="color: #6b7280; margin-bottom: 24px;">Voulez-vous vraiment effectuer cette action ?</p>
  <div style="display: flex; justify-content: flex-end; gap: 12px;">
    <button mat-button mat-dialog-close>Annuler</button>
    <button mat-raised-button color="warn" [mat-dialog-close]="true">Confirmer</button>
  </div>
</div>
